name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 1. Resolves the yellow Node.js warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # 2. Matches your pubspec.yaml SDK requirement
          flutter-version: '3.10.0' 
          
      - name: Repair and Build
        run: |
          flutter clean
          flutter pub get
          # 3. Fixes a common cloud build crash for apps with assets
          flutter build apk --release --no-tree-shake-icons 
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aotppmt-apk
          path: build/app/outputs/flutter-apk/app-release.apk
