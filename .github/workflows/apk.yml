name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          # This forces the latest stable environment (currently 3.22+)
          channel: 'stable'
          
      - name: Force Environment Upgrade
        run: |
          chmod +x android/gradlew
          # This forces the runner to upgrade past the old 3.0.0 SDK
          flutter upgrade
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aotppmt-apk
          path: build/app/outputs/flutter-apk/*.apk
