
name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2.16.0 # Using a specific stable version of the action
        with:
          channel: 'stable'
          flutter-version: '3.10.0' # Explicitly matching your code's requirement
          
      - name: Build APK
        run: |
          chmod +x android/gradlew
          flutter clean
          flutter pub get
          # The --no-tree-shake-icons flag is critical for cloud builds
          flutter build apk --release --no-tree-shake-icons
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aotppmt-apk
          path: build/app/outputs/flutter-apk/*.apk
